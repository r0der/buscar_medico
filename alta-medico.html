<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Alta de Médico</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #ffffff;
  text-align: center;
  padding: 40px;
}

.box {
  border: 1px solid #e5e7eb;
  padding: 25px;
  border-radius: 12px;
  display: inline-block;
}

.matricula {
  font-size: 28px;
  font-weight: bold;
  margin: 15px 0;
}

button {
  padding: 10px 16px;
  border: none;
  border-radius: 8px;
  background: #2563eb;
  color: white;
  cursor: pointer;
}

a {
  display: inline-block;
  margin-top: 15px;
  text-decoration: none;
  color: white;
  background: #10b981;
  padding: 10px 16px;
  border-radius: 8px;
}
</style>

<script>
function copiar() {
  const mat = document.getElementById("matricula").innerText;
  navigator.clipboard.writeText(mat);
  alert("Matrícula copiada");
}
</script>

</head>

<body>

<div class="box">
  <h3>Alta de nuevo médico</h3>

  <p>Copiá esta matrícula y pegala en el formulario:</p>

  <div id="matricula" class="matricula"></div>

  <button onclick="copiar()">Copiar matrícula</button>

  <br>

  <a href="https://www.notion.so/224ceb7fce0c8009842efc2bf5f3fff9?pvs=106" target="_blank">
    Ir al formulario
  </a>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const matricula = params.get("matricula");

document.getElementById("matricula").innerText = matricula || "-";
</script>

</body>
</html>
