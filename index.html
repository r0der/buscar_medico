<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificador de Médicos</title>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #eef2f7, #f8fafc);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .card {
    background: white;
    padding: 35px;
    border-radius: 18px;
    width: 420px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.08);
    text-align: center;
  }

  h2 {
    margin-bottom: 25px;
    font-weight: 600;
    color: #1e293b;
  }

  .input-group {
    display: flex;
    gap: 10px;
  }

  input {
    flex: 1;
    height: 48px;
    padding: 0 14px;
    border-radius: 10px;
    border: 1px solid #d1d5db;
    font-size: 15px;
    outline: none;
    transition: 0.2s;
  }

  input:focus {
    border-color: #1d4b8f;
    box-shadow: 0 0 0 3px rgba(29,75,143,0.1);
  }

  /* ❌ sacar flechitas */
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }

  input[type=number] {
    -moz-appearance: textfield;
  }

  button {
    height: 48px;
    padding: 0 20px;
    background: #1d4b8f;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: 0.2s;
    white-space: nowrap;
  }

  button:hover {
    background: #163d78;
  }

  #resultado {
    margin-top: 25px;
    text-align: left;
    padding: 18px;
    border-radius: 12px;
    display: none;
    font-size: 15px;
    line-height: 1.5;
  }

  .ok {
    background: #ecfdf5;
    color: #065f46;
    border: 1px solid #a7f3d0;
  }

  .error {
    background: #fef2f2;
    color: #7f1d1d;
    border: 1px solid #fecaca;
  }

  .title {
    font-weight: 600;
    margin-bottom: 10px;
  }
  
  button:disabled {
    background: #94a3b8;
    cursor: not-allowed;
  }
  
</style>
</head>

<body>

<div class="card">
  <h2>Verificar Médico</h2>

  <div class="input-group">
    <input type="number" id="matricula" placeholder="Ingrese matrícula">
    <button id="btnBuscar" onclick="verificar()">Buscar</button>
  </div>

  <div id="resultado"></div>
</div>

<script>
async function verificar() {
  const matricula = document.getElementById("matricula").value;
  const resultado = document.getElementById("resultado");
  const boton = document.getElementById("btnBuscar");

  if (!matricula) {
    resultado.className = "error";
    resultado.style.display = "block";
    resultado.innerHTML = "Ingresá una matrícula válida";
    return;
  }

  // 🔒 desactivar botón
  boton.disabled = true;
  boton.innerText = "Buscando...";

  resultado.style.display = "block";
  resultado.className = "";
  resultado.innerHTML = "🔎 Buscando médico...";

  try {
    const res = await fetch("/api/verificar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        matricula: Number(matricula)
      })
    });

    const data = await res.json();

    if (!res.ok) {
      resultado.className = "error";
      resultado.innerHTML = "Error: " + data.error;
      return;
    }

    if (data.encontrado) {
      resultado.className = "ok";
      resultado.innerHTML = `
        <div class="title">Médico existente</div>
        👤 <strong>${data.nombre || "Sin nombre"}</strong><br>
        📄 Matrícula: ${matricula}
      `;
    } else {
      resultado.className = "error";
      resultado.innerHTML = `
        <div class="title">Médico inexistente</div>
        La matrícula ${matricula} no está registrada.
      `;
    }

  } catch (e) {
    resultado.className = "error";
    resultado.innerHTML = "Error de conexión";
  } finally {
    // 🔓 reactivar botón SIEMPRE
    boton.disabled = false;
    boton.innerText = "Buscar";
    }
  }
  
  document.getElementById("matricula").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    verificar();
  }
  });
</script>

</body>
</html>
