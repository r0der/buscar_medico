<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Verificador de Matrícula</title>
</head>

<body style="font-family: Arial; padding:40px;">

  <h2>Verificar Médico</h2>

  <input type="number" id="matricula" placeholder="Ingrese matrícula">
  <br><br>

  <button onclick="verificar()">VERIFICAR</button>

  <p id="resultado"></p>

  <script>
    async function verificar() {
      const matricula = document.getElementById("matricula").value;
      const resultado = document.getElementById("resultado");

      if (!matricula) {
        resultado.innerText = "Ingresá una matrícula";
        resultado.style.color = "orange";
        return;
      }

      resultado.innerText = "Consultando...";

      try {
        const res = await fetch("/api/verificar", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            matricula: Number(matricula)
          })
        });

        const data = await res.json();

        if (!res.ok) {
          resultado.innerText = "Error: " + data.error;
          resultado.style.color = "orange";
          return;
        }

        if (data.encontrado) {
          resultado.innerText =
            "Médico existente" +
            (data.nombre ? " - " + data.nombre : "") +
            (data.tipo ? " (" + data.tipo + ")" : "");

          resultado.style.color = "green";
        } else {
          resultado.innerText = "Médico inexistente";
          resultado.style.color = "red";
        }

      } catch (error) {
        resultado.innerText = "Error de conexión con el servidor";
        resultado.style.color = "orange";
      }
    }
  </script>

</body>
</html>
