<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificador de Médicos</title>

<style>
* { box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #ffffff;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 50vh;
}

.card {
  background: white;
  padding: 40px;
  border-radius: 18px;
  width: 400px;
  text-align: center;
}

.logo {
  width: 100%;
  margin-bottom: 15px;
}

.input-group {
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  height: 48px;
  padding: 0 14px;
  border-radius: 10px;
  border: 1px solid #d1d5db;
}

button {
  height: 48px;
  padding: 0 20px;
  background: #1d4b8f;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.spinner {
  margin: 15px auto;
  width: 26px;
  height: 26px;
  border: 3px solid #e5e7eb;
  border-top: 3px solid #1d4b8f;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.oculto { display: none; }

#resultado {
  margin-top: 20px;
  padding: 18px;
  border-radius: 12px;
  display: none;
}

.ok { background: #ecfdf5; }
.error { background: #fef2f2; }

.alta-container {
  margin-top: 15px;
  padding: 14px;
  background: #eff6ff;
  border-radius: 12px;
  text-align: center;
}

.alta-btn {
  padding: 10px 16px;
  background: #2563eb;
  color: white;
  border-radius: 8px;
  text-decoration: none;
}

.ver-btn {
  display: inline-flex;
  gap: 6px;
  margin-top: 10px;
  padding: 8px 12px;
  background: #10b981;
  color: white;
  border-radius: 6px;
  text-decoration: none;
}

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal.show { display: flex; }

.modal-content {
  background: white;
  padding: 20px;
  border-radius: 14px;
  text-align: center;
  width: 280px;
}

.modal-text { font-size: 14px; }
.modal-title { font-weight: 600; }
.modal-count { font-size: 18px; }

.modal-actions {
  margin-top: 15px;
  display: flex;
  gap: 10px;
  justify-content: center;
}
</style>
</head>

<body>

<div class="card">
  <img src="buscaMatricula.png" class="logo">

  <div class="input-group">
    <input type="number" id="matricula" placeholder="Ingrese matrícula">
    <button onclick="verificar()">Buscar</button>
  </div>

  <div id="spinner" class="spinner oculto"></div>
  <div id="resultado"></div>
  <div id="altaContainer" class="oculto"></div>
</div>

<div id="modal" class="modal">
  <div class="modal-content">
    <p class="modal-text"><strong>Matrícula copiada</strong><br>Pegala en el formulario</p>
    <p class="modal-title">Abriendo alta médico</p>
    <p id="countdown" class="modal-count">5...</p>

    <div class="modal-actions">
      <button onclick="abrirAhora()">Abrir ahora</button>
      <button onclick="cancelarModal()">Cancelar</button>
    </div>
  </div>
</div>

<script>
let intervaloGlobal = null;
let urlAlta = "notion://www.notion.so/224ceb7fce0c8009842efc2bf5f3fff9?pvs=106";

async function verificar() {
  const matricula = document.getElementById("matricula").value;
  const resultado = document.getElementById("resultado");
  const altaContainer = document.getElementById("altaContainer");

  altaContainer.classList.add("oculto");

  if (!matricula) {
    resultado.className = "error";
    resultado.style.display = "block";
    resultado.innerHTML = "Ingresá una matrícula válida";
    return;
  }

  try {
    const res = await fetch("/api/verificar", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ matricula: Number(matricula) })
    });

    const data = await res.json();
    resultado.style.display = "block";

    if (data.encontrado) {
      resultado.className = "ok";
      resultado.innerHTML = `
        <div>Médico existente</div>
        <strong>${data.nombre}</strong><br>
        Matrícula: ${matricula}<br><br>

        <a href="${data.url}" target="_blank" class="ver-btn">
          Ver ficha en Notion
        </a>
      `;
    } else {
      resultado.className = "error";
      resultado.innerHTML = `No encontrado`;

      altaContainer.classList.remove("oculto");
      altaContainer.innerHTML = `
        <div class="alta-container">
          <a href="#" onclick="abrirAlta('${matricula}'); return false;" class="alta-btn">
            NUEVO MÉDICO
          </a>
        </div>
      `;
    }

  } catch {
    resultado.innerHTML = "Error de conexión";
  }
}

function abrirAlta(matricula) {
  navigator.clipboard.writeText(matricula);

  const modal = document.getElementById("modal");
  const countdown = document.getElementById("countdown");

  modal.classList.add("show");

  let t = 5;
  countdown.innerText = t + "...";

  intervaloGlobal = setInterval(() => {
    t--;
    countdown.innerText = t + "...";

    if (t === 0) {
      clearInterval(intervaloGlobal);
      redirigir();
    }
  }, 1000);
}

function abrirAhora() {
  clearInterval(intervaloGlobal);
  redirigir();
}

function cancelarModal() {
  clearInterval(intervaloGlobal);
  document.getElementById("modal").classList.remove("show");
}

function redirigir() {
  window.location.href = urlAlta;
  setTimeout(() => location.reload(), 1000);
}
</script>

</body>
</html>
