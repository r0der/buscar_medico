<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificador de Médicos</title>

<style>
* { box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #ffffff;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 50vh;
}

.card {
  background: white;
  padding: 40px;
  border-radius: 18px;
  width: 400px;
  text-align: center;
}

.logo {
  display: block;
  width: 100%;
  height: auto;
  margin-bottom: 15px;
}

.input-group {
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  height: 48px;
  padding: 0 14px;
  border-radius: 10px;
  border: 1px solid #d1d5db;
  font-size: 15px;
}

input:focus {
  border-color: #1d4b8f;
  box-shadow: 0 0 0 3px rgba(29,75,143,0.1);
}

input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button {
  -webkit-appearance: none;
}

input[type=number] {
  -moz-appearance: textfield;
}

button {
  height: 48px;
  padding: 0 20px;
  background: #1d4b8f;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

button:disabled {
  background: #94a3b8;
}

.spinner {
  margin: 15px auto 5px;
  width: 26px;
  height: 26px;
  border: 3px solid #e5e7eb;
  border-top: 3px solid #1d4b8f;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.oculto { display: none; }

.loading {
  font-size: 13px;
  color: #64748b;
  margin-bottom: 10px;
}

#resultado {
  margin-top: 20px;
  text-align: left;
  padding: 18px;
  border-radius: 12px;
  display: none;
}

.ok {
  background: #ecfdf5;
  color: #065f46;
  border: 1px solid #a7f3d0;
}

.error {
  background: #fef2f2;
  color: #7f1d1d;
  border: 1px solid #fecaca;
}

.title {
  font-weight: 600;
  margin-bottom: 10px;
}

.alta-container {
  margin-top: 15px;
  padding: 14px;
  border-radius: 12px;
  background: #eff6ff;
  border: 1px solid #bfdbfe;
  text-align: center;
}

.alta-btn {
  display: inline-block;
  padding: 10px 16px;
  background: #2563eb;
  color: white;
  border-radius: 8px;
  text-decoration: none;
}

.ver-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 10px;
  padding: 8px 12px;
  background: #10b981;
  color: white;
  border-radius: 6px;
  text-decoration: none;
  font-size: 13px;
}

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);

  display: none; /* 🔥 CAMBIO IMPORTANTE */

  justify-content: center;
  align-items: center;
  z-index: 999;
}

/* cuando se muestra */
.modal.show {
  display: flex;
}

.modal-content {
  background: white;
  padding: 20px;
  border-radius: 14px;
  text-align: center;
  width: 280px;
  animation: fadeIn 0.3s ease;
}

.modal-actions {
  margin-top: 18px;
  display: flex;
  gap: 10px;
  justify-content: center;
}

.btn-primary {
  background: #2563eb;
  color: white;
  border: none;
  padding: 10px 14px;
  border-radius: 8px;
  cursor: pointer;
}

.btn-secondary {
  background: #e5e7eb;
  color: #111827;
  border: none;
  padding: 10px 14px;
  border-radius: 8px;
  cursor: pointer;
}

  .modal-text {
  font-size: 14px;
  line-height: 1.3;
  margin-bottom: 10px;
}

.modal-title {
  font-size: 14px;
  font-weight: 600;
  margin-top: 10px;
  margin-bottom: 5px;
}

.modal-count {
  font-size: 18px;
  font-weight: bold;
  margin: 5px 0 10px;
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}
</style>
</head>

<body>

<div class="card">
  <img src="buscaMatricula.png" class="logo">

  <div class="input-group">
    <input type="number" id="matricula" placeholder="Ingrese matrícula">
    <button id="btnBuscar" onclick="verificar()">Buscar</button>
  </div>

  <div id="spinner" class="spinner oculto"></div>
  <div id="loadingText" class="loading oculto">Consultando base de datos...</div>

  <div id="resultado"></div>
  <div id="altaContainer" class="oculto"></div>
</div>

<!-- MODAL -->
<div id="modal" class="modal oculto">
  <div class="modal-content">
    <p class="modal-text">
  <strong>Matrícula copiada</strong><br>
  Pegala en el formulario
  </p>

  <p class="modal-title">
    Abriendo alta médico
  </p>
  
  <p id="countdown" class="modal-count">5...</p>

    <div class="modal-actions">
      <button onclick="abrirAhora()" class="btn-primary">Abrir ahora</button>
      <button onclick="cancelarModal()" class="btn-secondary">Cancelar</button>
    </div>
  </div>
</div>

<script>
let intervaloGlobal = null;
let urlAlta = "notion://www.notion.so/224ceb7fce0c8009842efc2bf5f3fff9?pvs=106";

async function verificar() {
  const matricula = document.getElementById("matricula").value;
  const resultado = document.getElementById("resultado");
  const boton = document.getElementById("btnBuscar");
  const spinner = document.getElementById("spinner");
  const loadingText = document.getElementById("loadingText");
  const altaContainer = document.getElementById("altaContainer");

  altaContainer.classList.add("oculto");
  altaContainer.innerHTML = "";

  if (!matricula) {
    resultado.className = "error";
    resultado.style.display = "block";
    resultado.innerHTML = "Ingresá una matrícula válida";
    return;
  }

  boton.disabled = true;
  spinner.classList.remove("oculto");
  loadingText.classList.remove("oculto");
  resultado.style.display = "none";

  try {
    const res = await fetch("/api/verificar", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ matricula: Number(matricula) })
    });

    const data = await res.json();
    resultado.style.display = "block";

    if (data.encontrado) {
      resultado.className = "ok";
      resultado.innerHTML = `
        <div class="title">Médico existente</div>
        👤 <strong>${data.nombre || "Sin nombre"}</strong><br>
        📄 Matrícula: ${matricula}<br>
        👨‍⚕️ Visitado por: ${data.aic || "Sin asignar"}<br><br>
    
        <a href="${data.url}" target="_blank" class="ver-btn">
          <svg width="16" height="16" viewBox="0 0 100 100" style="vertical-align: middle;">
            <rect width="100" height="100" fill="white" stroke="black" stroke-width="8"/>
            <text x="50%" y="60%" text-anchor="middle" font-size="55" font-family="Arial">N</text>
          </svg>
          Ver ficha en Notion
        </a>
      `;
    }
    } else {
      resultado.className = "error";
      resultado.innerHTML = `
        <div class="title">Médico inexistente</div>
        La matrícula ${matricula} no está registrada.
      `;

      altaContainer.classList.remove("oculto");
      altaContainer.innerHTML = `
        <div class="alta-container">
          <a href="#" class="alta-btn" onclick="abrirAlta('${matricula}'); return false;">
            NUEVO MÉDICO
          </a>
        </div>
      `;
    }

  } catch (e) {
    resultado.className = "error";
    resultado.style.display = "block";
    resultado.innerHTML = "Error de conexión";
  } finally {
    boton.disabled = false;
    spinner.classList.add("oculto");
    loadingText.classList.add("oculto");
  }
}

function abrirAlta(matricula) {
  const modal = document.getElementById("modal");
  const countdownEl = document.getElementById("countdown");

  navigator.clipboard.writeText(matricula);
  modal.classList.add("show");

  let tiempo = 5;
  countdownEl.innerText = tiempo + "...";

  intervaloGlobal = setInterval(() => {
    tiempo--;
    countdownEl.innerText = tiempo + "...";

    if (tiempo === 0) {
      clearInterval(intervaloGlobal);
      redirigir();
    }
  }, 1000);
}

function abrirAhora() {
  limpiarIntervalo();
  redirigir();
}

function cancelarModal() {
  limpiarIntervalo();
  document.getElementById("modal").remove("show");
}

function limpiarIntervalo() {
  if (intervaloGlobal) {
    clearInterval(intervaloGlobal);
    intervaloGlobal = null;
  }
}

function redirigir() {
  window.location.href = urlAlta;

  // 🔥 reset automático después de 1 segundo
  setTimeout(() => {
    location.reload();
  }, 1000);
}

document.getElementById("matricula").addEventListener("keypress", function(e) {
  if (e.key === "Enter") verificar();
});

document.getElementById("matricula").focus();

document.getElementById("matricula").addEventListener("input", () => {
  document.getElementById("resultado").style.display = "none";
  document.getElementById("altaContainer").classList.add("oculto");
});
</script>

</body>
</html>
